name: CI

on:
  push:
    paths-ignore:
      - CHANGELOG.md
      - '**.md'
  pull_request:
    paths-ignore:
      - CHANGELOG.md
      - '**.md'

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    runs-on: codeberg-small
    strategy:
      matrix:
        rust: [stable]
    steps:
      - uses: https://code.forgejo.org/actions/checkout@v4

      - name: Install Rust ${{ matrix.rust }}
        uses: https://github.com/dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.rust }}

      - name: Run tests
        run: cargo test --all-features --all-targets

  lint:
    name: Lint
    runs-on: codeberg-small
    strategy:
      matrix:
        rust: [stable]
    steps:
      - uses: https://code.forgejo.org/actions/checkout@v4

      - name: Install Rust ${{ matrix.rust }}
        uses: https://github.com/dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.rust }}

      - name: Add components
        run: rustup component add rustfmt clippy

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --all-features --all-targets -- -D warnings

      - name: Run cargo check
        run: cargo check --all-features --all-targets

  security:
    name: Security
    runs-on: codeberg-small
    steps:
      - uses: https://code.forgejo.org/actions/checkout@v4

      - name: Run Trivy vulnerability scan
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
          trivy fs --scanners vuln,secret,misconfig --exit-code 1 .

  specdown:
    name: Specdown
    runs-on: codeberg-medium
    steps:
      - uses: https://code.forgejo.org/actions/checkout@v4

      - name: Install Rust
        uses: https://github.com/dtolnay/rust-toolchain@stable

      - name: Install specdown
        uses: https://github.com/specdown/setup-specdown-action@v0.2.32

      - name: Build release binary
        run: cargo build --release

      - name: Run specdown
        run: |
          specdown run --temporary-workspace-dir --add-path "$(pwd)/target/release" ./README.md

  homebrew-formula:
    name: Audit Homebrew Formula
    runs-on: codeberg-small
    container:
      image: homebrew/brew:latest
    steps:
      - name: Clone repository (checkout action requires node, unavailable in homebrew container)
        run: |
          git clone --depth 50 "https://codeberg.org/${{ github.repository }}.git" .
          git fetch origin "${{ github.event.pull_request.head.sha || github.sha }}" 2>/dev/null || true
          git checkout FETCH_HEAD 2>/dev/null || git checkout "${{ github.sha }}" 2>/dev/null || true

      - name: Install yq and gettext
        run: |
          curl -L "https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64" -o /tmp/yq
          chmod +x /tmp/yq
          apt-get update
          apt-get install -y gettext
          apt-get clean

      - name: Generate and audit formula
        run: |
          VERSION=$(/tmp/yq -o tsv -p toml '.package.version' Cargo.toml)
          TEMP_DIR=$(mktemp -d)
          curl --silent --fail --output "$TEMP_DIR/v$VERSION.tar.gz" "https://codeberg.org/$GITHUB_REPOSITORY/archive/v$VERSION.tar.gz" || true
          if [ -s "$TEMP_DIR/v$VERSION.tar.gz" ]; then
            FILE_SHA=$(sha256sum --binary "$TEMP_DIR/v$VERSION.tar.gz" | cut -d' ' -f1)
            export GITHUB_REF_NAME="v$VERSION"
            export FILE_SHA
            envsubst < homebrew/formula.rb.envsubstr > "${GITHUB_REPOSITORY##*/}.rb"
            brew tap-new PurpleBooth/homebrew-releaser --no-git
            cp -v "${GITHUB_REPOSITORY##*/}.rb" "$(brew --repository)/Library/Taps/PurpleBooth/homebrew-releaser/Formula/"
            brew audit --formula "PurpleBooth/homebrew-releaser/${GITHUB_REPOSITORY##*/}"
          else
            echo "Skipping formula audit: release tarball not yet published"
          fi

  bump:
    name: Bump version
    needs: [test, lint, security, specdown, homebrew-formula]
    if: github.ref == 'refs/heads/main'
    runs-on: codeberg-small
    steps:
      - uses: https://code.forgejo.org/actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Rust
        uses: https://github.com/dtolnay/rust-toolchain@stable

      - name: Install cargo-binstall
        run: curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash

      - name: Install tools
        run: cargo binstall --no-confirm --locked cocogitto

      - name: Configure Git user
        run: |
          git config user.name "Forgejo Actions"
          git config user.email "forgejo-actions@codeberg.org"

      - name: Import GPG key
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --yes --import
          gpg --export-ownertrust | sed 's/:.*/:5:/' | gpg --import-ownertrust
          echo "${{ secrets.GPG_PASSPHRASE }}" > ~/.gpg-passphrase
          chmod 600 ~/.gpg-passphrase
          cat > ~/.gpg-wrapper.sh <<'EOF'
          #!/bin/sh
          gpg --batch --pinentry-mode loopback --passphrase-file ~/.gpg-passphrase "$@"
          EOF
          chmod +x ~/.gpg-wrapper.sh
          git config gpg.program ~/.gpg-wrapper.sh
          git config gpg.format openpgp
          KEY_ID=$(gpg --list-secret-keys --keyid-format LONG | grep sec | awk '{print $2}' | cut -d'/' -f2)
          git config user.signingkey "$KEY_ID"
          git config commit.gpgsign true

      - name: Bump version with cog
        run: |
          if VERSION=$(cog bump --dry-run --auto 2>/dev/null); then
            echo "Bumping to $VERSION"
            cog bump --auto
            git remote set-url origin https://token:${{ secrets.GITHUB_TOKEN }}@codeberg.org/${{ github.repository }}.git
            git push origin main --follow-tags
          else
            echo "No version bump needed"
          fi
